<!-- Exercício 01 -->
 <!DOCTYPE html>
 <html lang="pt-br">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrícula</title>
    <meta name="author" content="Maria Brancalione">
 </head>
 <body>
   <form action="./sucesso.html">
      <fieldset>
         <legend><h3>Matrícula</h3></legend>

         <label for="nome">Nome do Aluno:</label><br>
         <input  type="text" id="nome" name="nome" maxlength="50" required><br>

         <br>
         <label for="nascimento">Data de Nascimento:</label><br>
         <input type="date" id="nascimento" name="nascimento" required><br>

         <br>
         <label for="email">E-mail:</label><br>
         <input type="email" id="email" name="email" required><br>

         <br>
         <label for="telefone">Telefone:</label><br>
         <input type="tel" id="telefone" name="telefone" placehol="00 000000000" pattern="([0-9]{2}) [0-9]{9}" required><br>

         <br>
         <label for="serie">Série:</label><br>
         <select name="series" id="series" required>
            <option value="1">1º Ano</option><br>
            <option value="2">2º Ano</option><br>
            <option value="3">3º Ano</option><br>
            <option value="4">4º Ano</option><br>
         </select><br>

         <br>
         <label for="turno">Turno:</label><br>
         <input type="radio" id="manha" name="turno" value="Manhã" required> <!-- como todos tem o mesmo nome, colocando só um como required, entende que precisa ter plmns um deles -->
         <label for="manha">Manhã</label><br>
         <input type="radio" id="tarde" name="turno" value="Tarde">
         <label for="tarde">Tarde</label><br>
         <input type="radio" id="noite" name="turno" value="Noite">
         <label for="noite">Noite</label><br>

         <br>
         <label for="extras">Atividades Extracurriculares:</label><br>
         <input type="checkbox" id="teatro" name="extra1" value="Teatro">
         <label for="teatro">Teatro</label><br>
         <input type="checkbox" id="musica" name="extra2" value="Música">
         <label for="musica">Música</label><br>
         <input type="checkbox" id="ballet" name="extra3" value="Ballet">
         <label for="ballet">Ballet</label><br>
         <input type="checkbox" id="pintura" name="extra4" value="Pintura">
         <label for="pintura">Pintura</label><br>
         <input type="checkbox" id="judo" name="extra5" value="Judô">
         <label for="judo">Judô</label><br>
         <input type="checkbox" id="futebol" name="extra6" value="Futebol">
         <label for="futebol">Futebol</label><br>
         
         <br>
         <input type="submit">
      </fieldset>
   </form>
 </body>
 </html>
